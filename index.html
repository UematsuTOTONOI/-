<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyAG-q_VG4Q4tbPU57c06pIDh9sMTNJW0JM",
    authDomain: "survey-app-ea481.firebaseapp.com",
    projectId: "survey-app-ea481",
    storageBucket: "survey-app-ea481.firebasestorage.app",
    messagingSenderId: "168476269138",
    appId: "1:168476269138:web:09e56b97836ee4732add8b"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  window.submitForm = async function() {

    const ratingText = document.getElementById("q1").value;

    let rating = 3;
    if (ratingText.includes("とても満足")) rating = 5;
    else if (ratingText.includes("満足")) rating = 4;
    else if (ratingText.includes("普通")) rating = 3;
    else if (ratingText.includes("不満")) rating = 2;
    else rating = 1;

    const answers = [];
    for(let i=1; i<=9; i++){
      answers.push(document.getElementById("q"+i).value);
    }

    const review = document.getElementById("reviewText").value;

    const text = `
【総合】${answers[0]}
【料理】${answers[1]}
【見た目】${answers[2]}
【接客】${answers[3]}
【スピード】${answers[4]}
【清潔感】${answers[5]}
【価格】${answers[6]}
【再来店】${answers[7]}
【おすすめ】${answers[8]}

${review}
`;

    // 🔥 Firebase保存
    await addDoc(collection(db, "surveys"), {
      rating: rating,
      answers: answers,
      review: review,
      createdAt: new Date()
    });

    // 分岐
    if (rating >= 4) {
      await navigator.clipboard.writeText(text);
      alert("口コミ用の文章をコピーしました！");
      window.location.href = "https://search.google.com/local/writereview?placeid=YOUR_PLACE_ID";
    } else {
      alert("貴重なご意見ありがとうございます！");
    }
  }
</script>
